name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install tools
        run: task setup:tools

      - name: Check formatting
        run: task check:fmt

      - name: Check modules
        run: task check:mod

      - name: Lint
        run: task check:lint

      - name: Vulnerability check
        run: task check:vuln

      - name: Test
        run: task check:test

      - name: Cross-compile
        run: task check:compile
